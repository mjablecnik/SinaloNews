app = "sinalo-reader"
primary_region = "fra"

[build]

[env]
PUBLIC_ARTICLE_API_URL = "https://sinalo-classifier.fly.dev"

[http_service]
internal_port = 3000
force_https = true
auto_stop_machines = true
auto_start_machines = true
min_machines_running = 0

[[vm]]
memory = "256mb"
cpu_kind = "shared"
cpus = 1
