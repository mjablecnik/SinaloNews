app = "sinalo-feed"
primary_region = "fra"

[build]

[env]
  APP_HOST = "0.0.0.0"
  APP_PORT = "8000"
  REQUEST_DELAY_SECONDS = "1.0"
  REQUEST_TIMEOUT_SECONDS = "30"
  USER_AGENT = "RSSFeedPipeline/1.0 (+https://github.com/example/rss-feed-pipeline)"
  WEB_CONCURRENCY = "1"

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "15m"
  auto_start_machines = true
  min_machines_running = 0