app = "rss-feed-pipeline"
primary_region = "ams"

[build]

[env]
  APP_HOST = "0.0.0.0"
  APP_PORT = "8000"
  REQUEST_DELAY_SECONDS = "1.0"
  REQUEST_TIMEOUT_SECONDS = "30"
  USER_AGENT = "RSSFeedPipeline/1.0 (+https://github.com/example/rss-feed-pipeline)"

[[services]]
  internal_port = 8000
  protocol = "tcp"

  [[services.ports]]
    port = 80
    handlers = ["http"]

  [[services.ports]]
    port = 443
    handlers = ["tls", "http"]

  [services.concurrency]
    type = "connections"
    hard_limit = 25
    soft_limit = 20

  [[services.tcp_checks]]
    interval = "10s"
    timeout = "2s"
    grace_period = "5s"

  [[services.http_checks]]
    interval = "30s"
    timeout = "5s"
    grace_period = "10s"
    method = "GET"
    path = "/health"
